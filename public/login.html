<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Log in — WrapUp</title>
  <link rel="stylesheet" href="style.css?v=1.8" />
  <link rel="stylesheet" href="auth.css?v=1.8" />
</head>
<body>
  <div class="auth-card">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Log in to see your gaming year in review.</p>

    <div class="auth-error" id="authError"></div>

    <form id="loginForm">
      <div class="auth-field">
        <label for="username">Username or email</label>
        <input type="text" id="username" name="username" autocomplete="username" required />
      </div>
      <div class="auth-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />
      </div>
      <button type="submit" class="auth-submit" id="submitBtn">Log in</button>
    </form>

    <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
  </div>

  <script src="auth.js?v=1.8"></script>
</body>
</html>
