<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Timeline — WrapUp</title>
  <link rel="stylesheet" href="style.css?v=1.10" />
  <link rel="stylesheet" href="timeline.css?v=1.10" />
</head>
<body>
  <div class="tl-page">
    <header class="topbar tl-topbar">
      <div class="topbar-head">
        <div>
          <h1>WrapUp</h1>
          <p class="tagline">Your gaming, month by month.</p>
        </div>
        <button class="nav-toggle" id="navToggle" type="button" aria-label="Menu" aria-expanded="false" aria-controls="topbarActions">☰</button>
      </div>
      <div class="topbar-actions" id="topbarActions">
        <a class="btn-nav" href="index.html">← Dashboard</a>
        <a class="btn-nav" href="profile.html">👤 Profile</a>
        <span class="user-chip" id="userChip"></span>
        <button id="logoutBtn" class="btn-refresh" title="Log out">Log out</button>
      </div>
    </header>

    <div class="tl-layout">
      <aside class="tl-sidebar">
        <div class="tl-sidebar-title">Year</div>
        <nav class="tl-year-list" id="yearList"></nav>
      </aside>

      <main class="tl-main" id="tlMain">
        <div class="tl-empty" id="tlEmpty" style="display:none">No completed games with a known date this year.</div>
        <div id="tlMonths"></div>
      </main>
    </div>
  </div>

  <script src="timeline.js?v=1.10"></script>
</body>
</html>
